    <circle cx="820" cy="300" r="16" opacity="0.9" />
    <circle cx="880" cy="392" r="9" opacity="0.72" />
    <circle cx="646" cy="410" r="14" opacity="0.86" />
    <circle cx="736" cy="454" r="10" opacity="0.8" />
    <circle cx="842" cy="470" r="18" opacity="0.9" />
  </g>

  <g opacity="0.9">
