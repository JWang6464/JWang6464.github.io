<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Gas Law Simulation</title>
  <desc id="desc">Abstract chemistry-themed illustration with particles, flask shapes, and soft gradient lighting.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#203b35" />
      <stop offset="52%" stop-color="#13302c" />
      <stop offset="100%" stop-color="#081614" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="38%" r="60%">
      <stop offset="0%" stop-color="#9ff0c9" stop-opacity="0.92" />
      <stop offset="40%" stop-color="#58c8a5" stop-opacity="0.38" />
      <stop offset="100%" stop-color="#58c8a5" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d8fff2" stop-opacity="0.52" />
      <stop offset="100%" stop-color="#8ee0c1" stop-opacity="0.12" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b4ffe2" />
      <stop offset="100%" stop-color="#60d0ae" />
    </linearGradient>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)" />
  <circle cx="600" cy="360" r="360" fill="url(#glow)" />

  <g opacity="0.22" fill="none" stroke="#8ef0c6" stroke-width="3">
