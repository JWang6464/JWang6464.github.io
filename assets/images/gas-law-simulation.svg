    <path d="M378 255 L532 255 L552 650 Q455 706 358 650 Z" fill="url(#glass)" stroke="#d6fff1" stroke-opacity="0.38" stroke-width="4" />
    <path d="M422 170 H488 V255 H422 Z" fill="#d9fff3" fill-opacity="0.18" stroke="#d6fff1" stroke-opacity="0.38" stroke-width="4" />
    <path d="M358 650 Q455 706 552 650" fill="none" stroke="#d6fff1" stroke-opacity="0.38" stroke-width="4" />
    <path d="M392 560 C412 490, 500 485, 520 560 C532 602, 498 635, 456 635 C414 635, 380 602, 392 560 Z" fill="url(#accent)" fill-opacity="0.25" />
  </g>

